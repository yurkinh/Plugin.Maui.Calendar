name: Build Sample App for CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:
  build-sample-ci:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install .NET MAUI
      run: dotnet workload install maui
    - name: Build (Android)
      run: dotnet build samples\SampleApp\SampleApp.csproj -c Release -f net10.0-android
    - name: Build (Windows)
      run: dotnet build samples\SampleApp\SampleApp.csproj -c Release -f net10.0-windows10.0.19041.0
